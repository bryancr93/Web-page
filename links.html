<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Growing Along - Quick Links">
    <title>Links | Growing Along</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="links-page">
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2" style="bottom: 10%; right: 5%;"></div>
    </div>

    <main class="linktree-container">
        <!-- Encabezado con Logo -->
        <div class="linktree-header">
            <img src="assets/logo.png" alt="Growing Along Logo" class="brand-logo-large">
            <h1 class="linktree-title">Growing Along</h1>
            <p class="linktree-subtitle">ABA Therapy & Family Support</p>
        </div>

        <!-- Botones de Enlaces -->
        <div class="linktree-links">
            <a href="https://wa.me/17868487207" target="_blank" rel="noopener noreferrer" class="link-btn link-whatsapp">
                <span class="icon">💬</span> WhatsApp Us
            </a>
            <a href="sms:+17868487207" class="link-btn link-sms">
                <span class="icon">📱</span> Text Message
            </a>
            <a href="tel:+17868487207" class="link-btn link-call">
                <span class="icon">📞</span> Call Us
            </a>
            <a href="mailto:director@growingalong.com" class="link-btn link-email">
                <span class="icon">✉️</span> Email Us
            </a>
            <a href="index.html" class="link-btn link-website">
                <span class="icon">🌐</span> Visit Website
            </a>
            <!-- Botón Opcional para mostrar código QR para compartir en persona -->
            <button onclick="toggleQR()" class="link-btn link-share">
                <span class="icon">🔗</span> Show QR Code
            </button>
        </div>

        <!-- Contenedor oculto para el código QR -->
        <div id="qr-container" class="qr-code-popup" style="display: none;">
            <p>Scan to Share</p>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://bryancr93.github.io/Web-page/links.html" alt="QR Code" class="qr-image">
        </div>
    </main>

    <footer class="linktree-footer">
        <p>&copy; 2026 Growing Along</p>
    </footer>

    <script>
        function toggleQR() {
            const qrContainer = document.getElementById('qr-container');
            if (qrContainer.style.display === 'none') {
                qrContainer.style.display = 'block';
                // Pequeña animación hacia abajo
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            } else {
                qrContainer.style.display = 'none';
            }
        }

        // Efecto parallax responsivo suave solo si no está en dispositivo táctil bloqueado
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.blob');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            if(blobs.length >= 2) {
                blobs[0].style.transform = `translate(${x * 15}px, ${y * 15}px)`;
                blobs[1].style.transform = `translate(${-x * 20}px, ${-y * 20}px)`;
            }
        });
    </script>
</body>
</html>
