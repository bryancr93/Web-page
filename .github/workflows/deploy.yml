# Nombre del Action: Deploy static content to Pages
name: Deploy static content to Pages

on:
  # Ejecutar en `push` a la rama `main`
  push:
    branches: ["main"]

  # Permitir ejecución manual
  workflow_dispatch:

# Configurar permisos para poder crear páginas
permissions:
  contents: read
  pages: write
  id-token: write

# Solo permitir un despliegue a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Subir la carpeta entera (como es vanilla HTML, subimos ".")
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
